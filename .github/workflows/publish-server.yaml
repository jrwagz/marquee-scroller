# Publishes the WagFam heartbeat server image to GitHub Container Registry as a
# multi-architecture build (linux/amd64 + linux/arm64), and on tag pushes also
# deploys it to Azure App Service.
#
# Trigger matrix:
#   PR against master   → build only (no push, no deploy). Validates the build
#                         compiles for both architectures.
#   push to master      → build + push to ghcr.io with `master` tag. No deploy.
#   tag `server-v*.*.*` → build + push with the tag name + deploy to Azure.
#
# The "build only" mode for PRs is required because GitHub restricts
# GITHUB_TOKEN to read-only on PRs from forks (ours included), so the push
# would 403. Building without pushing still verifies the Dockerfile + buildx
# multi-arch path on every PR.
#
# Pattern mirrors jrwagz/pio-image's docker-build-publish.yaml:
# https://github.com/jrwagz/pio-image/blob/main/.github/workflows/docker-build-publish.yaml

name: Publish Server Image

on: # yamllint disable-line
  push:
    branches: ["master"]
    tags: ["server-v*.*.*"]
  pull_request:
    branches: ["master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wagfam-server

jobs:
  build-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write       # needed by docker/login-action + push to ghcr.io
      attestations: write   # needed by actions/attest@v4
      id-token: write       # needed by actions/attest@v4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=ref,event=branch
            type=ref,event=tag

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image (amd64 + arm64)
        id: push
        uses: docker/build-push-action@v7
        with:
          context: server/
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
          # Only write to the registry cache when we have push permission.
          # Empty string disables cache write (build still proceeds).
          cache-to: ${{ github.event_name != 'pull_request' && format('type=registry,ref={0}/{1}:cache,mode=max', env.REGISTRY, env.IMAGE_NAME) || '' }}

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}

      - name: Deploy to Azure App Service
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/server-v')
        uses: azure/webapps-deploy@v3
        with:
          app-name: wagfam-server
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
