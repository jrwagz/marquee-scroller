name: Lint, Test, and Build

on:
  push:
    branches: ["master"]
    # Publish semver tags as releases.
    tags: ["v*.*.*"]
  pull_request:
    branches: ["master"]

# Only allow a single running job for each PR/tag/branch
# and cancel any running jobs if a new one is created on top of it
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      attestations: write
      id-token: write
      artifact-metadata: write
      actions: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Native Test Report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }} # run this step even if previous step failed
        with:
          name: Native Test Results
          badge-title: Native Tests
          path: 'artifacts/test-native-results.xml'
          reporter: java-junit

      - name: Scripts Test Report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }} # run this step even if previous step failed
        with:
          name: Scripts Test Results
          badge-title: Scripts Tests
          path: 'artifacts/test-scripts-results.xml'
          reporter: java-junit

      - name: Server Test Report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }} # run this step even if previous step failed
        with:
          name: Server Test Results
          badge-title: Server Tests
          path: 'artifacts/test-server-results.xml'
          reporter: java-junit

      - name: Build
        run: make build

      - name: Gather Artifacts
        run: make artifacts

      - name: Keep Artifacts
        uses: actions/upload-artifact@v7
        with:
          path: artifacts/

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest@v4
        with:
          subject-path: 'artifacts/*'

      - name: Create release
        if: github.event_name == 'push' && startsWith( github.ref, 'refs/tags/' )
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_URL=$(gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes)
          echo "html_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"

      - name: Package release artifacts
        if: github.event_name == 'push' && startsWith( github.ref, 'refs/tags/' )
        run: |
          zip -r "${{ github.event.repository.name }}-${{ github.ref_name }}-artifacts.zip" artifacts/
          cp artifacts/firmware.bin "${{ github.event.repository.name }}-${{ github.ref_name }}.bin"

      - name: Upload release artifacts zip
        if: github.event_name == 'push' && startsWith( github.ref, 'refs/tags/' )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "${{ github.event.repository.name }}-${{ github.ref_name }}-artifacts.zip"

      - name: Upload release artifacts bin
        if: github.event_name == 'push' && startsWith( github.ref, 'refs/tags/' )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "${{ github.event.repository.name }}-${{ github.ref_name }}.bin"

      - name: Write release summary
        if: github.event_name == 'push' && startsWith( github.ref, 'refs/tags/' )
        run: |
          echo "## Release" >> "$GITHUB_STEP_SUMMARY"
          echo "[${{ github.ref_name }}](${{ steps.create_release.outputs.html_url }})" >> "$GITHUB_STEP_SUMMARY"
