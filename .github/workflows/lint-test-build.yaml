name: Lint, Test, and Build

on:
  push:
    branches: ["master"]
    # Publish semver tags as releases.
    tags: ["v*.*.*"]
  pull_request:
    branches: ["master"]

# Only allow a single running job for each PR/tag/branch
# and cancel any running jobs if a new one is created on top of it
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      attestations: write
      id-token: write
      artifact-metadata: write
      actions: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lint
        run: make lint

      - name: Webui typecheck
        run: make webui-typecheck

      - name: Test
        run: make test

      - name: Native Test Report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }} # run this step even if previous step failed
        with:
          name: Native Test Results
          badge-title: Native Tests
          path: 'artifacts/test-native-results.xml'
          reporter: java-junit

      - name: Scripts Test Report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }} # run this step even if previous step failed
        with:
          name: Scripts Test Results
          badge-title: Scripts Tests
          path: 'artifacts/test-scripts-results.xml'
          reporter: java-junit

      - name: Build
        run: make build

      - name: Build webui
        run: make webui

      - name: Build LittleFS image
        run: make buildfs

      - name: Gather Artifacts
        run: make artifacts

      - name: Build Summary
        if: success()
        run: |
          VERSION=$(cat artifacts/VERSION.txt)
          SPA_RAW=$(find data/spa -type f -not -name '*.gz' -exec cat {} + | wc -c)
          SPA_GZ=$(find data/spa -name '*.gz' -exec cat {} + | wc -c)
          echo "## Build" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** \`${VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**SPA bundle:** ${SPA_RAW} B raw / ${SPA_GZ} B gzipped" >> "$GITHUB_STEP_SUMMARY"

      - name: Keep Artifacts
        uses: actions/upload-artifact@v7
        with:
          path: artifacts/

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest@v4
        with:
          subject-path: 'artifacts/*'

      - name: Create release
        if: github.event_name == 'push' && startsWith( github.ref, 'refs/tags/' )
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_URL=$(gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes)
          echo "html_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"

      - name: Build merged image
        if: github.event_name == 'push' && startsWith( github.ref, 'refs/tags/' )
        run: |
          # firmware.bin (sketch @ 0x0) + littlefs.bin (FS @ 0x300000) joined
          # into a single image users can flash with one esptool command.
          # OTA still uses firmware.bin alone (sketch only) and SPA refresh
          # still uses littlefs.bin alone — merged.bin is the recommended
          # first-time install path because it eliminates offset arithmetic
          # and version-skew between sketch and SPA.
          if [ -f artifacts/littlefs.bin ]; then
            python3 -m pip install --quiet 'esptool>=4.0'
            esptool.py --chip esp8266 merge_bin \
              -o artifacts/merged.bin \
              --flash_mode dio --flash_size 4MB \
              0x0 artifacts/firmware.bin \
              0x300000 artifacts/littlefs.bin
          fi

      - name: Package release artifacts
        if: github.event_name == 'push' && startsWith( github.ref, 'refs/tags/' )
        run: |
          zip -r "${{ github.event.repository.name }}-${{ github.ref_name }}-artifacts.zip" artifacts/
          cp artifacts/firmware.bin "${{ github.event.repository.name }}-${{ github.ref_name }}.bin"
          # Also expose littlefs.bin and merged.bin as top-level assets. OTA
          # only updates the sketch; the SPA at /spa lives in LittleFS and
          # requires a separate flash. merged.bin combines both so first-time
          # serial installs are a single command. Surfacing all three at the
          # release root means users don't need to unzip artifacts (issue #63).
          if [ -f artifacts/littlefs.bin ]; then
            cp artifacts/littlefs.bin "${{ github.event.repository.name }}-${{ github.ref_name }}-littlefs.bin"
          fi
          if [ -f artifacts/merged.bin ]; then
            cp artifacts/merged.bin "${{ github.event.repository.name }}-${{ github.ref_name }}-merged.bin"
          fi

      - name: Upload release artifacts zip
        if: github.event_name == 'push' && startsWith( github.ref, 'refs/tags/' )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "${{ github.event.repository.name }}-${{ github.ref_name }}-artifacts.zip"

      - name: Upload release artifacts bin
        if: github.event_name == 'push' && startsWith( github.ref, 'refs/tags/' )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "${{ github.event.repository.name }}-${{ github.ref_name }}.bin"
          if [ -f "${{ github.event.repository.name }}-${{ github.ref_name }}-littlefs.bin" ]; then
            gh release upload "${{ github.ref_name }}" \
              "${{ github.event.repository.name }}-${{ github.ref_name }}-littlefs.bin"
          fi
          if [ -f "${{ github.event.repository.name }}-${{ github.ref_name }}-merged.bin" ]; then
            gh release upload "${{ github.ref_name }}" \
              "${{ github.event.repository.name }}-${{ github.ref_name }}-merged.bin"
          fi

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: docker/setup-buildx-action@v4

      - name: Publish firmware binary to simple-web-server image
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=$(cat artifacts/VERSION.txt)
          FILENAME="marquee-scroller-${VERSION}.bin"
          cp artifacts/firmware.bin "${FILENAME}"
          printf 'FROM jrwagz/simple-web-server:latest\nCOPY %s /usr/local/apache2/htdocs/%s\n' \
            "${FILENAME}" "${FILENAME}" > Dockerfile.firmware
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag jrwagz/simple-web-server:latest \
            --tag jrwagz/simple-web-server:${VERSION} \
            --file Dockerfile.firmware \
            --push \
            .
          echo "FIRMWARE_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Reload Azure firmware web app
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: azure/webapps-deploy@v3
        with:
          app-name: files-jrwagz
          publish-profile: ${{ secrets.AZURE_FIRMWARE_PUBLISH_PROFILE }}
          images: docker.io/jrwagz/simple-web-server:${{ env.FIRMWARE_VERSION }}

      - name: Back up wagfam-server before firmware env update
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        id: backup
        env:
          WAGFAM_API_KEY: ${{ secrets.WAGFAM_API_KEY }}
        run: |
          if curl -sf \
               -H "Authorization: token ${WAGFAM_API_KEY}" \
               "https://wagfam-server.azurewebsites.net/api/v1/backup" \
               -o /tmp/backup.json; then
            echo "has_backup=true" >> "$GITHUB_OUTPUT"
            echo "Backup saved ($(wc -c < /tmp/backup.json) bytes)"
          else
            echo "has_backup=false" >> "$GITHUB_OUTPUT"
            echo "No live server reachable — skipping backup"
          fi

      - name: Login to Azure for wagfam-server update
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_WAGFAM_SERVER_CREDENTIALS }}

      - name: Notify wagfam-server of new firmware version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --name wagfam-server \
              --resource-group wagfam-server-group \
              --settings \
                WAGFAM_FIRMWARE_VERSION="${{ env.FIRMWARE_VERSION }}" \
                WAGFAM_FIRMWARE_URL="http://files-jrwagz.azurewebsites.net/marquee-scroller-${{ env.FIRMWARE_VERSION }}.bin"

      - name: Wait for wagfam-server restart and restore backup
        if: >-
          github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') &&
          steps.backup.outputs.has_backup == 'true'
        env:
          WAGFAM_API_KEY: ${{ secrets.WAGFAM_API_KEY }}
        run: |
          echo "Polling calendar endpoint until new firmware version is confirmed (up to 5 min)..."
          for i in $(seq 1 30); do
            REPORTED=$(curl -sf \
                -H "Authorization: token ${WAGFAM_API_KEY}" \
                "https://wagfam-server.azurewebsites.net/api/v1/calendar" \
                | jq -r '.[0].config.latestVersion // ""' 2>/dev/null) || REPORTED=""
            if [ "$REPORTED" = "${FIRMWARE_VERSION}" ]; then
              echo "Server is reporting new firmware version ${REPORTED}."
              break
            fi
            echo "Attempt ${i}/30: got '${REPORTED}', retrying in 10s..."
            sleep 10
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Server did not report firmware version ${FIRMWARE_VERSION} within 300s" >&2
              exit 1
            fi
          done
          echo "Restoring backup..."
          curl -sf -X POST \
            -H "Authorization: token ${WAGFAM_API_KEY}" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/backup.json \
            "https://wagfam-server.azurewebsites.net/api/v1/backup"
          echo "Restore complete."

      - name: Write release summary
        if: github.event_name == 'push' && startsWith( github.ref, 'refs/tags/' )
        run: |
          echo "## Release" >> "$GITHUB_STEP_SUMMARY"
          echo "[${{ github.ref_name }}](${{ steps.create_release.outputs.html_url }})" >> "$GITHUB_STEP_SUMMARY"
