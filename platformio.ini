; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = marquee/
include_dir = marquee/
#lib_dir = marquee/libs
default_envs = default
test_dir = tests

[env]
platform = espressif8266
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200
lib_deps =
  ; tzapu/WiFiManager pulls in the sync ESP8266WebServer header, which collides
  ; with ESPAsyncWebServer's HTTP_GET/HTTP_POST/... enum. Use the async-native
  ; replacement that shares our AsyncWebServer instance for the captive portal.
  alanswx/ESPAsyncWiFiManager@^0.31.0
  Adafruit GFX Library@^1.12
  PaulStoffregen/Time@^1.6
  ArduinoJson@^7.4
  esphome/ESPAsyncTCP-esphome@^2.0.0
  esphome/ESPAsyncWebServer-esphome@^3.3.0

[env:default]
board = d1_mini
# Wemos D1 (mini) is function compatible with Node MCU V0.9 and V2.0 and other ESP devkits, but not pin compatible!
# Wemos D1 mini lite is NOT compatible! (has only 1MB flash)
extra_scripts = pre:scripts/build_version.py
build_flags =
  #-Wl,-Map=firmware.map -Wall -Wextra -Wfatal-errors -Wunused-variable
  '-DWAGFAM_TRUSTED_FIRMWARE_DOMAINS="files-jrwagz.azurewebsites.net"'

# Local-development environment: same as `default`, but with the
# auto-update branch disabled. Use this when running a locally-built
# firmware that doesn't match the calendar server's published
# `latestVersion` — without the flag the device auto-reverts to the
# server's build at the next calendar refresh, losing local work.
#
#   pio run -e dev
#   pio run -e dev --target upload --upload-port /dev/cu.usbserial-XX
#
# The default env (used by CI / releases) keeps auto-update on.
[env:dev]
extends = env:default
build_flags =
  ${env:default.build_flags}
  -DWAGFAM_AUTO_UPDATE_DISABLED=1

[env:native_test]
platform = native
framework =
test_framework = unity
test_filter = native/*
build_flags =
  -std=gnu++17
  -I tests/native/stubs
  -I marquee
  -I lib/json-streaming-parser
build_src_filter = -<*>
lib_deps =
lib_ignore = json-streaming-parser

